<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記帳本</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f0;--surface:#ffffff;--surface2:#f1efe8;--border:#e0ddd6;
  --text:#1a1a18;--text2:#6b6964;--text3:#9b9893;
  --green:#1D9E75;--green-bg:#E1F5EE;--green-dark:#0F6E56;
  --red:#D85A30;--red-bg:#FAECE7;--red-dark:#993C1D;
  --blue:#378ADD;--purple:#7F77DD;--amber:#BA7517;--amber-bg:#FAEEDA;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a18;--surface:#242422;--surface2:#2c2c2a;--border:#3a3a38;
    --text:#f0ede8;--text2:#9b9893;--text3:#6b6964;
    --green:#5DCAA5;--green-bg:#04342C;--green-dark:#9FE1CB;
    --red:#F0997B;--red-bg:#4A1B0C;--red-dark:#F5C4B3;
    --amber-bg:#412402;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;line-height:1.5}
.app{max-width:860px;margin:0 auto;padding:1.5rem 1rem 4rem}
h1{font-size:22px;font-weight:600;margin-bottom:1.5rem;letter-spacing:-0.3px}
.tabs{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:1px solid var(--border)}
.tab{font-size:14px;font-weight:500;padding:8px 16px;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.15s}
.tab.active{color:var(--text);border-bottom-color:var(--text)}
.tab:hover:not(.active){color:var(--text)}
.panel{display:none}.panel.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1rem}
.metric{background:var(--surface2);border-radius:var(--radius);padding:1rem}
.metric-label{font-size:12px;color:var(--text2);margin-bottom:6px}
.metric-value{font-size:22px;font-weight:600}
.income-color{color:var(--green)}
.expense-color{color:var(--red)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.form-grid{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
label{font-size:13px;color:var(--text2)}
input,select{font-family:inherit;font-size:14px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);width:100%;outline:none;transition:border-color 0.15s}
input:focus,select:focus{border-color:var(--text2)}
.type-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.type-btn{flex:1;padding:9px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);transition:all 0.15s}
.type-btn.active.expense{background:var(--red-bg);color:var(--red-dark)}
.type-btn.active.income{background:var(--green-bg);color:var(--green-dark)}
.type-btn:not(.active):hover{background:var(--surface2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 18px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:inherit}
.btn:hover{background:var(--surface2)}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-primary:hover{opacity:0.85;background:var(--text)}
.tx-list{display:flex;flex-direction:column;gap:6px;max-height:440px;overflow-y:auto}
.tx-item{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--surface2);border-radius:var(--radius)}
.tx-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:12px;color:var(--text2)}
.tx-amount{font-size:15px;font-weight:600;flex-shrink:0}
.tx-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:2px 6px;border-radius:4px;line-height:1;flex-shrink:0}
.tx-del:hover{color:var(--red);background:var(--red-bg)}
.section-title{font-size:16px;font-weight:600;margin-bottom:1rem}
.budget-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.budget-row:last-child{border-bottom:none}
.budget-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.budget-bar-bg{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin:4px 0}
.budget-bar{height:100%;border-radius:3px;transition:width 0.4s}
.budget-text{font-size:12px;color:var(--text2)}
.budget-set{display:flex;align-items:center;gap:8px;flex-shrink:0}
.budget-set input{width:100px}
.empty{text-align:center;padding:2.5rem;color:var(--text2);font-size:14px}
.filter-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.filter-row select{width:auto}
.chart-wrap{position:relative;height:280px;width:100%}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:12px;color:var(--text2)}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.alert{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:10px;background:var(--amber-bg);color:var(--amber);border:1px solid #FAC775}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:var(--radius-lg);font-size:13px;font-weight:500;opacity:0;transition:all 0.3s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <h1>💰 記帳本</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">總覽</button>
    <button class="tab" onclick="switchTab('add')">新增記錄</button>
    <button class="tab" onclick="switchTab('records')">記錄列表</button>
    <button class="tab" onclick="switchTab('budget')">預算管理</button>
    <button class="tab" onclick="switchTab('charts')">圖表分析</button>
  </div>

  <!-- 總覽 -->
  <div id="panel-overview" class="panel active">
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">本月收入</div><div class="metric-value income-color" id="m-income">$0</div></div>
      <div class="metric"><div class="metric-label">本月支出</div><div class="metric-value expense-color" id="m-expense">$0</div></div>
      <div class="metric"><div class="metric-label">本月結餘</div><div class="metric-value" id="m-balance">$0</div></div>
    </div>
    <div id="budget-alerts"></div>
    <div class="card">
      <div class="section-title">最近記錄</div>
      <div class="tx-list" id="recent-list"></div>
    </div>
  </div>

  <!-- 新增 -->
  <div id="panel-add" class="panel">
    <div class="card">
      <div class="section-title" style="margin-bottom:1.25rem">新增收支記錄</div>
      <div style="margin-bottom:14px">
        <div class="type-toggle">
          <button class="type-btn active expense" id="btn-expense" onclick="setType('expense')">支出</button>
          <button class="type-btn" id="btn-income" onclick="setType('income')">收入</button>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>金額 (TWD)</label>
          <input type="number" id="in-amount" placeholder="0" min="0" step="1">
        </div>
        <div class="form-group">
          <label>日期</label>
          <input type="date" id="in-date">
        </div>
        <div class="form-group">
          <label>分類</label>
          <select id="in-cat"></select>
        </div>
        <div class="form-group">
          <label>說明（選填）</label>
          <input type="text" id="in-note" placeholder="備註">
        </div>
      </div>
      <div style="margin-top:1rem;display:flex;justify-content:flex-end">
        <button class="btn btn-primary" onclick="addTransaction()">新增記錄</button>
      </div>
    </div>
  </div>

  <!-- 記錄列表 -->
  <div id="panel-records" class="panel">
    <div class="filter-row">
      <select id="filter-month" onchange="renderRecords()"></select>
      <select id="filter-type" onchange="renderRecords()">
        <option value="all">全部類型</option>
        <option value="expense">支出</option>
        <option value="income">收入</option>
      </select>
      <select id="filter-cat" onchange="renderRecords()"><option value="all">全部分類</option></select>
    </div>
    <div class="card">
      <div class="tx-list" id="all-list"></div>
    </div>
  </div>

  <!-- 預算 -->
  <div id="panel-budget" class="panel">
    <div class="card">
      <div class="section-title">每月支出預算設定</div>
      <div id="budget-list"></div>
    </div>
  </div>

  <!-- 圖表 -->
  <div id="panel-charts" class="panel">
    <div class="card">
      <div class="section-title">本月支出分類</div>
      <div id="pie-legend" class="legend"></div>
      <div class="chart-wrap"><canvas id="pieChart" role="img" aria-label="本月支出分類圓餅圖"></canvas></div>
    </div>
    <div class="card">
      <div class="section-title">近6個月收支趨勢</div>
      <div class="chart-wrap"><canvas id="barChart" role="img" aria-label="近6個月收支趨勢長條圖"></canvas></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const CATS = {
  expense: [
    {id:'food',name:'餐飲',icon:'🍜',color:'#D85A30'},
    {id:'transport',name:'交通',icon:'🚌',color:'#378ADD'},
    {id:'shopping',name:'購物',icon:'🛍️',color:'#D4537E'},
    {id:'entertainment',name:'娛樂',icon:'🎬',color:'#7F77DD'},
    {id:'health',name:'醫療',icon:'💊',color:'#1D9E75'},
    {id:'utilities',name:'水電',icon:'💡',color:'#BA7517'},
    {id:'other',name:'其他',icon:'📌',color:'#888780'},
  ],
  income: [
    {id:'salary',name:'薪資',icon:'💼',color:'#1D9E75'},
    {id:'freelance',name:'接案',icon:'💻',color:'#378ADD'},
    {id:'invest',name:'投資',icon:'📈',color:'#7F77DD'},
    {id:'bonus',name:'獎金',icon:'🎁',color:'#BA7517'},
    {id:'other_in',name:'其他',icon:'📌',color:'#888780'},
  ]
};

let txType = 'expense';
let transactions = [];
let budgets = {};
let pieInst, barInst;

// 使用 localStorage 永久儲存
function save() {
  localStorage.setItem('budget_app_data', JSON.stringify({ transactions, budgets }));
}

function load() {
  try {
    const raw = localStorage.getItem('budget_app_data');
    if (raw) {
      const d = JSON.parse(raw);
      transactions = d.transactions || [];
      budgets = d.budgets || {};
    }
  } catch(e) {
    transactions = [];
    budgets = {};
  }
  init();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function init() {
  const today = new Date();
  document.getElementById('in-date').value = today.toISOString().split('T')[0];
  setType('expense');
  populateMonthFilter();
  populateCatFilter();
  renderAll();
}

function getCat(type, id) {
  return (CATS[type] || CATS.expense).find(c => c.id === id) || { name: id, icon: '📌', color: '#888780' };
}

function setType(t) {
  txType = t;
  document.getElementById('btn-expense').className = 'type-btn' + (t === 'expense' ? ' active expense' : '');
  document.getElementById('btn-income').className = 'type-btn' + (t === 'income' ? ' active income' : '');
  const sel = document.getElementById('in-cat');
  sel.innerHTML = CATS[t].map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
}

function nowYM() {
  const d = new Date();
  return d.getFullYear() + '-' + (d.getMonth() + 1).toString().padStart(2, '0');
}

function txYM(tx) { return tx.date.substring(0, 7); }

function addTransaction() {
  const amt = parseFloat(document.getElementById('in-amount').value);
  const date = document.getElementById('in-date').value;
  const cat = document.getElementById('in-cat').value;
  const note = document.getElementById('in-note').value.trim();
  if (!amt || amt <= 0) { showToast('請輸入有效金額'); return; }
  if (!date) { showToast('請選擇日期'); return; }
  transactions.unshift({ id: Date.now(), type: txType, amount: amt, date, cat, note });
  save();
  document.getElementById('in-amount').value = '';
  document.getElementById('in-note').value = '';
  renderAll();
  showToast('✓ 記錄已新增');
  switchTab('overview');
}

function deleteTransaction(id) {
  if (!confirm('確定刪除此筆記錄？')) return;
  transactions = transactions.filter(t => t.id !== id);
  save();
  renderAll();
  showToast('已刪除');
}

function getMonthTotals(ym) {
  let income = 0, expense = 0;
  transactions.filter(t => txYM(t) === ym).forEach(t => {
    if (t.type === 'income') income += t.amount;
    else expense += t.amount;
  });
  return { income, expense };
}

function fmt(n) { return '$' + Math.round(n).toLocaleString(); }

function renderAll() {
  renderOverview();
  renderRecords();
  renderBudget();
  if (document.getElementById('panel-charts').classList.contains('active')) renderCharts();
}

function renderOverview() {
  const ym = nowYM();
  const { income, expense } = getMonthTotals(ym);
  const balance = income - expense;
  document.getElementById('m-income').textContent = fmt(income);
  document.getElementById('m-expense').textContent = fmt(expense);
  const mb = document.getElementById('m-balance');
  mb.textContent = fmt(balance);
  mb.style.color = balance >= 0 ? 'var(--green)' : 'var(--red)';

  const alertsEl = document.getElementById('budget-alerts');
  alertsEl.innerHTML = '';
  CATS.expense.forEach(c => {
    const bgt = budgets[c.id];
    if (!bgt) return;
    const spent = transactions.filter(t => t.type === 'expense' && t.cat === c.id && txYM(t) === ym).reduce((a, t) => a + t.amount, 0);
    const pct = spent / bgt;
    if (pct >= 0.8) {
      alertsEl.innerHTML += `<div class="alert">${c.icon} ${c.name} 預算已使用 ${Math.round(pct * 100)}%（${fmt(spent)} / ${fmt(bgt)}）${pct >= 1 ? ' ⚠️ 已超出預算！' : ''}</div>`;
    }
  });

  const list = document.getElementById('recent-list');
  const recent = transactions.slice(0, 8);
  list.innerHTML = recent.length ? recent.map(t => txHTML(t)).join('') : '<div class="empty">還沒有記錄，去新增一筆吧！</div>';
}

function txHTML(t) {
  const c = getCat(t.type, t.cat);
  const sign = t.type === 'income' ? '+' : '-';
  const cls = t.type === 'income' ? 'income-color' : 'expense-color';
  return `<div class="tx-item">
    <div class="tx-icon" style="background:${c.color}22">${c.icon}</div>
    <div class="tx-info">
      <div class="tx-name">${t.note || c.name}</div>
      <div class="tx-meta">${t.date} · ${c.name}</div>
    </div>
    <div class="tx-amount ${cls}">${sign}${fmt(t.amount).replace('$','')}</div>
    <button class="tx-del" onclick="deleteTransaction(${t.id})">×</button>
  </div>`;
}

function populateMonthFilter() {
  const months = [...new Set(transactions.map(t => txYM(t)))];
  const ym = nowYM();
  if (!months.includes(ym)) months.unshift(ym);
  months.sort().reverse();
  const sel = document.getElementById('filter-month');
  const cur = sel.value;
  sel.innerHTML = months.map(m => `<option value="${m}"${m===cur?' selected':''}>${m}</option>`).join('');
}

function populateCatFilter() {
  const sel = document.getElementById('filter-cat');
  const all = [...CATS.expense, ...CATS.income];
  sel.innerHTML = '<option value="all">全部分類</option>' + all.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
}

function renderRecords() {
  populateMonthFilter();
  const ym = document.getElementById('filter-month').value;
  const type = document.getElementById('filter-type').value;
  const cat = document.getElementById('filter-cat').value;
  let list = transactions.filter(t => txYM(t) === ym);
  if (type !== 'all') list = list.filter(t => t.type === type);
  if (cat !== 'all') list = list.filter(t => t.cat === cat);
  const el = document.getElementById('all-list');
  el.innerHTML = list.length ? list.map(t => txHTML(t)).join('') : '<div class="empty">此篩選條件下沒有記錄</div>';
}

function renderBudget() {
  const ym = nowYM();
  const el = document.getElementById('budget-list');
  el.innerHTML = CATS.expense.map(c => {
    const bgt = budgets[c.id] || 0;
    const spent = transactions.filter(t => t.type === 'expense' && t.cat === c.id && txYM(t) === ym).reduce((a, t) => a + t.amount, 0);
    const pct = bgt > 0 ? Math.min(spent / bgt, 1) : 0;
    const barColor = pct >= 1 ? '#D85A30' : pct >= 0.8 ? '#EF9F27' : '#1D9E75';
    return `<div class="budget-row">
      <div class="budget-icon" style="background:${c.color}22">${c.icon}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:500;margin-bottom:2px">${c.name}</div>
        ${bgt > 0 ? `<div class="budget-bar-bg"><div class="budget-bar" style="width:${Math.round(pct*100)}%;background:${barColor}"></div></div>
        <div class="budget-text">${fmt(spent)} / ${fmt(bgt)}</div>` : '<div style="font-size:12px;color:var(--text2)">未設定預算</div>'}
      </div>
      <div class="budget-set">
        <input type="number" min="0" step="100" placeholder="金額" value="${bgt || ''}" id="bgt-${c.id}">
        <button class="btn" onclick="saveBudget('${c.id}')">儲存</button>
      </div>
    </div>`;
  }).join('');
}

function saveBudget(id) {
  const v = parseFloat(document.getElementById('bgt-' + id).value) || 0;
  budgets[id] = v;
  save();
  renderAll();
  showToast('✓ 預算已儲存');
}

const PIE_COLORS = ['#D85A30','#378ADD','#D4537E','#7F77DD','#1D9E75','#BA7517','#888780'];

function renderCharts() {
  const ym = nowYM();
  const expTx = transactions.filter(t => t.type === 'expense' && txYM(t) === ym);
  const catTotals = {};
  expTx.forEach(t => { catTotals[t.cat] = (catTotals[t.cat] || 0) + t.amount; });
  const catKeys = Object.keys(catTotals).sort((a, b) => catTotals[b] - catTotals[a]);
  const labels = catKeys.map(k => getCat('expense', k).name);
  const data = catKeys.map(k => Math.round(catTotals[k]));
  const colors = PIE_COLORS.slice(0, catKeys.length);

  document.getElementById('pie-legend').innerHTML = catKeys.length
    ? catKeys.map((k, i) => `<span class="legend-item"><span class="legend-dot" style="background:${colors[i]}"></span>${labels[i]} ${fmt(data[i])}</span>`).join('')
    : '';

  const pieCtx = document.getElementById('pieChart');
  if (pieInst) { pieInst.destroy(); pieInst = null; }
  if (data.length) {
    pieInst = new Chart(pieCtx, {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: getComputedStyle(document.documentElement).getPropertyValue('--surface').trim() || '#fff' }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
  }

  const now = new Date();
  const months = [], incArr = [], expArr = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = d.getFullYear() + '-' + (d.getMonth() + 1).toString().padStart(2, '0');
    months.push((d.getMonth() + 1) + '月');
    const tot = getMonthTotals(key);
    incArr.push(Math.round(tot.income));
    expArr.push(Math.round(tot.expense));
  }

  const barCtx = document.getElementById('barChart');
  if (barInst) { barInst.destroy(); barInst = null; }
  barInst = new Chart(barCtx, {
    type: 'bar',
    data: {
      labels: months,
      datasets: [
        { label: '收入', data: incArr, backgroundColor: '#5DCAA5', borderRadius: 4 },
        { label: '支出', data: expArr, backgroundColor: '#F0997B', borderRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { usePointStyle: true, pointStyle: 'rect', font: { size: 12 } } } },
      scales: { x: { grid: { display: false } }, y: { ticks: { callback: v => '$' + v.toLocaleString() } } }
    }
  });
}

function switchTab(name) {
  const names = ['overview', 'add', 'records', 'budget', 'charts'];
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', names[i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'charts') renderCharts();
}

load();
</script>
</body>
</html>
